<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
    <title>Conference</title>
  </head>
  <body>
    <!-- Navbar Start -->

    <nav>
      <div class="brand-logo">
        <img src="./img/Container.png" alt="" />
      </div>

      <ul class="nav">
        <li><a href="">Speaker</a></li>
        <li><a href="">Schedule</a></li>
        <li><a href="">Tracks</a></li>
        <li><a href="">Venue</a></li>
        <li><a href="">Blog</a></li>
      </ul>
      <button class="btn-primary">Register Now</button>
    </nav>

    <!-- Navbar End -->

    <!-- Header Start -->

    <header>
      <div class="header-content">
        <h1>Code. <em>Connect.</em> Create</h1>
        <p>
          Join 4,000+ engineers, founders, and builders at the premier developer
          conference of 2026. Three days of cutting-edge talks, hands-on
          workshops, and meaningful connections.
        </p>
        <button class="btn-primary-lrg">Register Now</button>
      </div>
    </header>

    <!-- Header End -->

    <!-- Speaker Section Start -->

    <section class="speakers">
      <h2>Meet the Speakers</h2>
      <div class="speaker-block">
        <div class="speaker-card">
          <img src="" alt="" class="speaker-img" />
          <div class="speaker-content">
            <p class="speaker-sector"></p>
            <h3 class="speaker-name"></h3>
          </div>
        </div>
      </div>
    </section>

    <!-- Speaker Section End -->
  </body>
</html>
